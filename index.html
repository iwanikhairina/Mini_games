<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mini Games Siska</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100vh;font-family:Arial,sans-serif;background:linear-gradient(135deg,#3D0000,#6B0000);;}
#app{width:100%;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 10px 40px;}
.screen{width:100%;max-width:600px;display:none;flex-direction:column;align-items:center;gap:12px;}
.screen.active{display:flex;}
.logo{font-size:50px;text-align:center;}
h1{font-size:clamp(20px,5vw,26px);font-weight:800;color:#ffffff;text-align:center;}
.sub{font-size:13px;color:#888;text-align:center;}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;}
.card{background:#fff;border:2px solid #eee;border-radius:14px;padding:14px 8px;cursor:pointer;text-align:center;transition:transform 0.1s;}
.card:active{transform:scale(0.94);}
.card:hover{box-shadow:0 6px 18px rgba(0,0,0,0.1);transform:translateY(-2px);}
.card .ci{font-size:clamp(26px,6vw,34px);margin-bottom:6px;}
.card .cn{font-size:clamp(13px,3.5vw,16px);font-weight:800;color:#2d2d2d;}
.card .cd{font-size:clamp(10px,2.5vw,12px);color:#aaa;margin-top:3px;}
.card.easy{border-top:4px solid #1D9E75;}
.card.medium{border-top:4px solid #BA7517;}
.card.hard{border-top:4px solid #E24B4A;}
.mbar{display:flex;align-items:center;gap:10px;background:#fff;border-radius:12px;padding:10px 14px;border:1.5px solid #e0e0e0;width:100%;}
.mbtn{background:#f5f5f5;border:1.5px solid #ddd;border-radius:8px;font-size:18px;cursor:pointer;padding:5px 10px;}
.mbtn:active{background:#e8e8e8;}
.mlbl{font-size:12px;color:#888;flex:1;}
.msts{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;}
.msts.on{background:#E1F5EE;color:#0F6E56;}
.msts.off{background:#f0f0f0;color:#aaa;}
input[type=range]{flex:1;max-width:80px;accent-color:#1D9E75;cursor:pointer;}
.hdr{display:flex;align-items:center;justify-content:space-between;width:100%;gap:6px;}
.btn{font-size:clamp(11px,2.8vw,13px);color:#555;background:#fff;border:1.5px solid #ddd;border-radius:9px;padding:8px 11px;cursor:pointer;white-space:nowrap;user-select:none;}
.btn:active{background:#eee;}
.badge{font-size:clamp(11px,2.8vw,13px);font-weight:700;padding:6px 13px;border-radius:9px;}
.be{background:#E1F5EE;color:#0F6E56;}
.bm{background:#FAEEDA;color:#854F0B;}
.bh{background:#FCEBEB;color:#A32D2D;}
.minfo{display:flex;gap:6px;align-items:center;}
.mvs{font-size:clamp(11px,2.8vw,13px);color:#666;white-space:nowrap;}
.pbar{width:100%;height:7px;background:#e0e0e0;border-radius:4px;overflow:hidden;}
.pfill{height:100%;background:#1D9E75;border-radius:4px;transition:width 0.3s;}
#board{display:grid;gap:2px;background:#999;border:3px solid #888;border-radius:12px;overflow:hidden;user-select:none;touch-action:manipulation;margin:0 auto;}
.piece{overflow:hidden;cursor:pointer;position:relative;}
.piece:active{filter:brightness(0.78);}
.piece.sel{outline:4px solid #3b8cff;outline-offset:-4px;z-index:2;filter:brightness(1.08);}
.piece img{display:block;pointer-events:none;}
.pvbox{display:flex;align-items:center;gap:14px;background:#fff;border-radius:12px;padding:10px 16px;border:1.5px solid #e0e0e0;width:100%;}
.pvimg{object-fit:cover;border-radius:8px;border:2px solid #ddd;flex-shrink:0;width:72px;height:72px;}
.pvinfo{display:flex;flex-direction:column;gap:4px;}
.pvlbl{font-size:11px;color:#bbb;font-weight:700;letter-spacing:.5px;}
.pvnum{font-size:17px;color:#1D9E75;font-weight:800;}
.pmini{height:6px;width:clamp(80px,28vw,150px);background:#eee;border-radius:3px;overflow:hidden;}
.pminif{height:100%;background:#1D9E75;border-radius:3px;transition:width 0.3s;}
.ppct{font-size:11px;color:#ccc;}
.win-screen{text-align:center;gap:14px;}
.wini{font-size:60px;}
.wimg{border-radius:14px;border:3px solid #ddd;max-width:min(280px,80vw);}
.wbtn{background:#1D9E75;color:#fff;border:none;border-radius:14px;padding:14px 40px;font-size:clamp(14px,4vw,18px);cursor:pointer;font-weight:800;}
.wbtn:active{transform:scale(0.96);}
.hint{font-size:11px;color:#ccc;margin-top:4px;}
</style>
</head>
<body>
<div id="app">
<div class="screen active" id="smenu">
  <div class="logo">🧩</div>
  <h1>Puzzle Siska</h1>
  <p class="sub">Pilih level untuk mulai bermain</p>
  <div class="mbar">
    <button class="mbtn" id="mbtn1" onclick="toggleMusic()">🎵</button>
    <span class="mlbl">Musik latar</span>
    <input type="range" min="0" max="1" step="0.05" value="0.5" oninput="setVol(this.value)">
    <span class="msts off" id="msts">OFF</span>
  </div>
  <div class="cards">
    <div class="card easy" onclick="startGame('easy')"><div class="ci">😊</div><div class="cn">Easy</div><div class="cd"></div></div>
    <div class="card medium" onclick="startGame('medium')"><div class="ci">🤔</div><div class="cn">Medium</div><div class="cd"></div></div>
    <div class="card hard" onclick="startGame('hard')"><div class="ci">😤</div><div class="cn">Hard</div><div class="cd"></div></div>
  </div>
</div>
<div class="screen" id="sgame">
  <div class="hdr">
    <button class="btn" onclick="goMenu()">← Menu</button>
    <span class="badge" id="lbadge">Easy</span>
    <div class="minfo">
      <span class="mvs">Langkah: <b id="mcnt">0</b></span>
      <button class="btn" onclick="shuffleBoard()">🔀</button>
      <button class="btn" id="mbtn2" onclick="toggleMusic()">🎵</button>
    </div>
  </div>
  <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;">
    <div id="board"></div>
    <div class="pvbox">
      <img class="pvimg" id="pvimg" src="" alt="ref">
      <div class="pvinfo">
        <span class="pvlbl">REFERENSI</span>
        <span class="pvnum" id="pvnum">0/0</span>
        <div class="pmini"><div class="pminif" id="pminif" style="width:0%"></div></div>
        <span class="ppct" id="ppct">0% selesai</span>
      </div>
    </div>
  </div>
</div>
<div class="screen win-screen" id="swin">
  <div class="wini">🎉</div>
  <h1>Selamat!</h1>
  <p class="sub" id="winmsg"></p>
  <img class="wimg" id="wimg" src="" alt="win">
  <button class="wbtn" onclick="goMenu()">🔁 Main Lagi</button>
</div>
</div>

  hard:   {cols:6,rows:5,label:'Hard',  badge:'bh'}
};
let lv=null,pieces=[],sel=null,moves=0,slices={};
let actx=null,gainNode=null,musicOn=false,loopTimer=null;

function initAudio(){
  if(actx)return;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  gainNode=actx.createGain();
  gainNode.gain.value=0.5;
  gainNode.connect(actx.destination);
}

function playLoop(){
  if(!actx||!musicOn)return;
  const BPM=100,b=60/BPM;
  const mel=[[523,1],[587,0.5],[659,0.5],[698,1],[784,2],[698,1],[659,1],[587,2],
             [523,1],[659,1],[784,1],[880,2],[784,1],[698,1],[659,2],[523,2],
             [392,1],[440,1],[494,1],[523,2],[587,1],[523,1],[494,2],[392,2]];
  const bass=[[131,2],[165,2],[196,2],[175,2],[131,2],[165,2],[196,2],[220,2],
              [131,2],[165,2],[196,2],[175,2],[131,2],[165,2],[196,2],[220,2]];
  let t=actx.currentTime+0.05;
  function sched(notes,type,vol){
    let ct=t;
    notes.forEach(([f,d])=>{
      const osc=actx.createOscillator();
      const env=actx.createGain();
      osc.type=type;osc.frequency.value=f;
      env.gain.setValueAtTime(0,ct);
      env.gain.linearRampToValueAtTime(vol,ct+0.02);
      env.gain.linearRampToValueAtTime(0.001,ct+d*b-0.04);
      osc.connect(env);env.connect(gainNode);
      osc.start(ct);osc.stop(ct+d*b);
      ct+=d*b;
    });
    return ct;
  }
  const end=sched(mel,'triangle',0.4);
  sched(bass,'sine',0.25);
  const dur=(end-t)*1000;
  if(loopTimer)clearTimeout(loopTimer);
  loopTimer=setTimeout(()=>{if(musicOn)playLoop();},dur-100);
}

function toggleMusic(){
  initAudio();
  if(actx.state==='suspended')actx.resume();
  musicOn=!musicOn;
  if(musicOn){playLoop();setMUI('🔊',true);}
  else{if(loopTimer)clearTimeout(loopTimer);setMUI('🎵',false);}
}

function setMUI(icon,on){
  ['mbtn1','mbtn2'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=icon;});
  const s=document.getElementById('msts');
  if(s){s.textContent=on?'ON':'OFF';s.className='msts '+(on?'on':'off');}
}

function setVol(v){if(gainNode)gainNode.gain.value=parseFloat(v);}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goMenu(){sel=null;showScreen('smenu');}

function getPW(l){
  const avail=Math.min(window.innerWidth,600)-26;
  const c=CFG[l];
  let pw=Math.floor(avail/c.cols);pw=Math.max(pw,24);
  const r={easy:1.1,medium:0.85,hard:0.72}[l];
  let ph=Math.round(pw*r);ph=Math.max(ph,20);
  return{pw,ph};
}

function startGame(l){
  lv=l;moves=0;sel=null;
  const c=CFG[l];
  document.getElementById('mcnt').textContent='0';
  document.getElementById('lbadge').textContent=c.label;
  document.getElementById('lbadge').className='badge '+c.badge;
  document.getElementById('pvimg').src=IMGS[l];
  document.getElementById('wimg').src=IMGS[l];
  showScreen('sgame');
  buildSlices(l);
}

function buildSlices(l){
  const c=CFG[l];const{pw,ph}=getPW(l);const total=c.cols*c.rows;
  const img=new Image();
  img.onload=()=>{
    slices={};
    for(let i=0;i<total;i++){
      const cv=document.createElement('canvas');cv.width=pw;cv.height=ph;
      const ctx=cv.getContext('2d');
      const iw=img.naturalWidth/c.cols,ih=img.naturalHeight/c.rows;
      ctx.drawImage(img,(i%c.cols)*iw,Math.floor(i/c.cols)*ih,iw,ih,0,0,pw,ph);
      slices[i]=cv.toDataURL('image/png');
    }
    pieces=Array.from({length:total},(_,i)=>i);
    doShuffle(pieces);
    renderBoard(l);
  };
  img.src=IMGS[l];
}

function renderBoard(l){
  const c=CFG[l];const{pw,ph}=getPW(l);
  const b=document.getElementById('board');
  b.style.gridTemplateColumns='repeat('+c.cols+','+pw+'px)';
  b.innerHTML='';
  pieces.forEach((p,pos)=>{
    const div=document.createElement('div');
    div.className='piece';div.style.cssText='width:'+pw+'px;height:'+ph+'px;';
    const img=document.createElement('img');
    img.src=slices[p];img.style.cssText='width:'+pw+'px;height:'+ph+'px;';
    div.appendChild(img);
    div.addEventListener('click',()=>onTap(pos));
    b.appendChild(div);
  });
  updateProg();
}

function onTap(pos){
  const cells=document.querySelectorAll('.piece');
  if(sel===null){sel=pos;cells[pos].classList.add('sel');}
  else if(sel===pos){cells[pos].classList.remove('sel');sel=null;}
  else{
    [pieces[sel],pieces[pos]]=[pieces[pos],pieces[sel]];
    cells[sel].classList.remove('sel');
    cells[sel].querySelector('img').src=slices[pieces[sel]];
    cells[pos].querySelector('img').src=slices[pieces[pos]];
    sel=null;moves++;
    document.getElementById('mcnt').textContent=moves;
    updateProg();checkWin();
  }
}

function updateProg(){
  if(!lv)return;
  const tot=pieces.length,ok=pieces.filter((p,i)=>p===i).length;
  const pct=Math.round(ok/tot*100);
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('pminif').style.width=pct+'%';
  document.getElementById('pvnum').textContent=ok+'/'+tot+' benar';
  document.getElementById('ppct').textContent=pct+'% selesai';
}

function checkWin(){
  if(pieces.every((p,i)=>p===i)){
    setTimeout(()=>{
      document.getElementById('winmsg').textContent='Level '+CFG[lv].label+' selesai dalam '+moves+' langkah!';
      showScreen('swin');
    },300);
  }
}

function doShuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}
function shuffleBoard(){
  doShuffle(pieces);sel=null;moves=0;
  document.getElementById('mcnt').textContent='0';
  document.querySelectorAll('.piece').forEach(c=>c.classList.remove('sel'));
  pieces.forEach((p,i)=>{document.querySelectorAll('.piece')[i].querySelector('img').src=slices[p];});
  updateProg();
}
window.addEventListener('resize',()=>{if(lv)buildSlices(lv);});
</script>
</body>
</html>
